# format: name: link || icon
# sub-menu
# name || icon:
#   name || link || icon
menu:
  主页: / || fas fa-home
  文章||fas fa-folder-minus:
  - 档案 || /archives/ || fas fa-archive
  - 标签 || /tags/ || fas fa-tags
  - 分类 || /categories/ || fas fa-folder-open
  常用|| fas fa-feather: 
  - 笔记 || /class-note/ || fas fa-pencil-alt
  - 知识总结 || /复习/ || fas fa-list
  - 备忘清单 || /memorandum/ || fas fa-calendar-alt
  - 日常记账 || /tally/ || fas fa-list
  - github-private || https://github.com/frunoob/PRIVATE || fas  fa-hand-paper 
  - Graduate|| /kaoyan/ || fas fa-pencil-alt
  娱乐||fas fa-list:
  - 图片 || /entertainment/Gallery/ || fas fa-images
  - 电影 || /entertainment/film/ || fas fa-film
  - 音乐 || /entertainment/music/ || fas fa-music
  - 锻炼 || /entertainment/work-out/ || fas fa-running
  实验 || fa fa-flask:
  - COVID-19数据可视化 || /web-homework/ || fa fa-desktop
  工具 || fas fa-tools :
  - fa5图标备忘录 || https://fa5.dashgame.com/#/%E5%9B%BE%E6%A0%87 || fas fa-bookmark
  - 字幕转换 || https://gotranscript.com/subtitle-converter
  - 评论管理 || https://frunoob.avosapps.us/ || fas fa-cog
  - markdown-it || /markdown-it/ || fa fa-desktop
  - tableCovert || https://tableconvert.com/ || fa fa-desktop
  收藏 || fas fa-biohazard :
  - 好看的网站 || /favorites/blogs/ || fas fa-eye

  留言: /leave-your-message/ || fa fa-comment
  说说: /artitalk/ || fa fa-comments
  love: /lover/ || fas fa-heart fa-lg 
  
  

# Hide the child menu items in mobile sidebar
hide_sidebar_menu_child: false

# Code Blocks (代碼相關)
# --------------------------------------

highlight_theme: mac light #  darker / pale night / light / ocean / mac / mac light / false
highlight_copy: true # copy button
highlight_lang: true # show the code language
highlight_shrink: false # true: shrink the code blocks / false: expand the code blocks | none: expand code blocks and hide the button
code_word_wrap: true

# copy settings
# copyright: Add the copyright information after copied content (複製的內容後面加上版權信息)
copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

# social settings (社交圖標設置)
# formal:
#   icon: link || the description
social:
  fab fa-github: https://github.com/frunoob?tab=repositories || Github Repositories
  fas fa-envelope: mailto:fqq1305108661@gmail.com || Will open the email software on this computer
  fas fa-headphones-alt: https://music.163.com/#/user/home?id=403723239 || 网易云音乐

# search (搜索)
# --------------------------------------

# Algolia search
algolia_search:
  enable: false
  hits:
    per_page: 6
  labels:
    input_placeholder: 搜索文章
    hits_empty: "未找到: ${query}" # if there are no result
    hits_stats: '${hits} 结果在 ${time} ms内找到'

# Local search
local_search:
  enable: true


# Math (數學)
# --------------------------------------
# About the per_page
# if you set it to true, it will load mathjax/katex script in each page (true 表示每一頁都加載js)
# if you set it to false, it will load mathjax/katex script according to your setting (add the 'mathjax: true' in page's front-matter)
# (false 需要時加載，須在使用的 Markdown Front-matter 加上 mathjax: true)

# MathJax
mathjax:
  enable: true
  per_page: false

# KaTeX
katex:
  enable: true
  per_page: false
  hide_scrollbar: true

# Image (圖片設置)
# --------------------------------------

# Favicon（網站圖標）
favicon: https://cdn.jsdelivr.net/gh/frunoob/images/blog/favicon.png

# Avatar (頭像)
avatar:
  img: https://cdn.jsdelivr.net/gh/frunoob/images/blog/favicon.png
  effect: false

# The banner image of home page
index_img: 

# If the banner of page not setting, it will show the top_img
default_top_img: 

disable_top_img: false

change_font_size: true

# The banner image of archive page
archive_img:

# If the banner of tag page not setting, it will show the top_img
# note: tag page, not tags page (子標籤頁面的 top_img)
tag_img:

# The banner image of tag page
# format: 
#  - tag name: xxxxx
tag_per_img:

# If the banner of category page not setting, it will show the top_img
# note: category page, not categories page (子分類頁面的 top_img)
category_img:

# The banner image of category page
# format: 
#  - category name: xxxxx
category_per_img:

# If you are using hexo-douban, you can configure it (如果你有使用 hexo-douban,可配置這個)
# douban:
#   meta: false
#   movies_img:
#   books_img:
#   games_img:

cover:
  # display the cover or not (是否顯示文章封面)
  index_enable: true
  aside_enable: true
  archives_enable: true
  # the position of cover in home page (封面顯示的位置)
  # left/right/both
  position: both
  # When cover is not set, the default cover is displayed (當沒有設置cover時，默認的封面顯示)
  default_cover:
    - https://pic4.zhimg.com/v2-e522801945af3714797aa2c5bfb0db79_1440w.jpg?source=172ae18b

# Replace Broken Images (替換無法顯示的圖片)
error_img:
  flink: https://cdn.jsdelivr.net/gh/frunoob/images/blog/friend_404.gif
  post_page: https://cdn.jsdelivr.net/gh/frunoob/images/blog/404.jpg

# A simple 404 page
error_404:
  enable: true
  subtitle: '呃呃，似乎没有找到'
  background: none

post_meta:
  page: # Home Page
    date_type: created # created or updated or both 主頁文章日期是創建日或者更新日或都顯示
    date_format: date # date/relative 顯示日期還是相對日期
    categories: true # true or false 主頁是否顯示分類
    tags: true # true or false 主頁是否顯示標籤
    label: true # true or false 顯示描述性文字
  post:
    date_type: both # created or updated or both 文章頁日期是創建日或者更新日或都顯示
    date_format: date # date/relative 顯示日期還是相對日期
    categories: true # true or false 文章頁是否顯示分類
    tags: true # true or false 文章頁是否顯示標籤
    label: true # true or false 顯示描述性文字

# wordcount (字數統計)
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Display the article introduction on homepage
# 1: description
# 2: both (if the description exists, it will show description, or show the auto_excerpt)
# 3: auto_excerpt (default)
# false: do not show the article introduction
index_post_content:
  method: 1
  length: 50 # if you set method to 2 or 3, the length need to config

# Post
# --------------------------------------

# toc (目錄)
toc:
  enable: true
  number: true
  auto_open: true # auto open the sidebar

post_copyright:
  enable: false
  decode: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Sponsor/reward
reward:
  enable: true
  QR_code:
    - img: https://cdn.jsdelivr.net/gh/frunoob/images/blog/wechat.png
      link: https://www.baidu.com/s?wd=%E5%BE%AE%E4%BF%A1%E5%A6%82%E4%BD%95%E6%89%AB%E7%A0%81
      text: 微信
    - img: https://cdn.jsdelivr.net/gh/frunoob/images/blog/alipay.png
      link: https://www.baidu.com/s?wd=%E6%94%AF%E4%BB%98%E5%AE%9D%E5%A6%82%E4%BD%95%E6%89%AB%E7%A0%81
      text: 支付宝

# Related Articles
related_post:
  enable: true
  limit: 2 # Number of posts displayed
  date_type: created # or created or updated 文章日期顯示創建日或者更新日

# figcaption (圖片描述文字)
photofigcaption: false

# anchor
# when you scroll in post, the URL will update according to header id.
anchor: true

# Displays outdated notice for a post (文章過期提醒)
noticeOutdate:
  enable: true
  style: flat # style: simple/flat
  limit_day: 90 # When will it be shown
  position: bottom # position: top/bottom
  message_prev: 这篇文章距离上次更新已经过去足足
  message_next: 天了，文章的内容可能已经过时了，仅供参考。

